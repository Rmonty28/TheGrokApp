name: crimson_habit
description: A beautiful black and red themed habit tracker app to forge your discipline.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  flutter_launcher_icons: ^0.13.1
  in_app_purchase: ^3.1.0  # For subscriptions

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Crimson
      fonts:
        - asset: assets/fonts/CrimsonText-Regular.ttf
